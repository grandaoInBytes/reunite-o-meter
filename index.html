<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reunite-o-meter 💖</title>

    <link rel="preload" as="image" href="images/image1.jpg" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button id="history-btn" title="View Past Countdowns">📜</button>

    <div id="history-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2>Our Past Adventures</h2>
        <ul id="history-list">
          </ul>
      </div>
    </div>

    <div class="background"></div>
    <div class="container">
      <h1 id="countdown-title">💘 Vacanza in Italia 💘</h1>
      <div class="countdown" id="countdown">
        <div><span id="days">00</span><p>Days</p></div>
        <div><span id="hours">00</span><p>Hours</p></div>
        <div><span id="minutes">00</span><p>Minutes</p></div>
        <div><span id="seconds">00</span><p>Seconds</p></div>
      </div>
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <p class="message">Loading the hug 🥺</p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
